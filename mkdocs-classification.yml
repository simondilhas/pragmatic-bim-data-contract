site_name: Pragmatic BIM Classifications
site_url: https://schema.pragmaticbim.ch/classification/
use_directory_urls: false

extra_css:
  - stylesheets/pragmatic-bim-brand.css

docs_dir: site/classification/.md-src
site_dir: site/classification/.html-build
theme:
  name: material
  palette:
  - scheme: default
    primary: custom
    accent: custom
  features:
  - search.suggest
  - search.highlight
  - content.code.copy
  - navigation.top
nav:
- Overview: index.md
- Vocabularies:
  - Building space activity classification: room-activity.md
  - Separator wall role classification: separator-wall-role.md
  - Separator slab role classification: separator-slab-role.md
  - Connection physical type classification: connection-physical-type.md
  - Abstract workflow participant roles: roles.md
  - Document function classification: document-function.md
  - Abstract use case classification: usecase.md
  - Abstract material classification: material.md
- Mappings:
  - Separator role to space activity mapping: mapping-separator-role-to-space-activity.md
  - Room activity to D0165 mapping: mapping-room-activity-to-d0165.md
  - D0165 to room activity mapping: mapping-d0165-to-room-activity.md
  - Room activity to SIA 416 mapping: mapping-room-activity-to-sia416.md
  - Abstract roles to BKP mapping: mapping-roles-to-bkp.md
  - Abstract material to Uniclass Ma mapping: mapping-material-to-uniclass-ma.md
plugins:
- search
validation:
  unrecognized_links: ignore
markdown_extensions:
- tables
- toc:
    permalink: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: '!!python/name:pymdownx.superfences.fence_code_format'
- attr_list
- md_in_html

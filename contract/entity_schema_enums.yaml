  CostRecordRole:
    enum_uri: pbs:CostRecordRole
    permissible_values:
      cost:
        title: Cost
        description: Internal or vendor cost for a catalog product.
        meaning: pbs:cost_record_role_cost
        alt_descriptions:
          de:
            source: de
            description: Kosten
      price:
        title: Price
        description: Sale or list price for a catalog product; may be customer-specific.
        meaning: pbs:cost_record_role_price
        alt_descriptions:
          de:
            source: de
            description: Preis
      estimate:
        title: Estimate
        description: Project-side estimated cost line.
        meaning: pbs:cost_record_role_estimate
        alt_descriptions:
          de:
            source: de
            description: Schaetzung
      actual:
        title: Actual
        description: Project-side incurred or actual cost line.
        meaning: pbs:cost_record_role_actual
        alt_descriptions:
          de:
            source: de
            description: Ist
  QuantityType:
    enum_uri: pbs:QuantityType
    permissible_values:
      area_net_horizontal:
        description: Net horizontal area, typically usable floor area excluding non-net parts.
        meaning: ifcowl:IfcQuantityArea
      area_gross_horizontal:
        description: Gross horizontal area, typically measured to outer boundaries.
        meaning: ifcowl:IfcQuantityArea
      area_net_vertical:
        description: Net vertical area, typically wall or facade area excluding deductions.
        meaning: ifcowl:IfcQuantityArea
      area_gross_vertical:
        description: Gross vertical area, typically full wall or facade area including non-net portions.
        meaning: ifcowl:IfcQuantityArea
      volume_net:
        description: Net enclosed volume after subtracting non-counted voids or deductions.
        meaning: ifcowl:IfcQuantityVolume
      volume_gross:
        description: Gross enclosed volume measured to external or gross boundaries.
        meaning: ifcowl:IfcQuantityVolume
      length:
        description: Linear extent of an element or feature.
        meaning: ifcowl:IfcQuantityLength
      width:
        description: Width dimension of an element, opening, or space proxy.
        meaning: ifcowl:IfcQuantityLength
      height:
        description: Height dimension of an element, opening, or space proxy.
        meaning: ifcowl:IfcQuantityLength
      perimeter:
        description: Boundary length around a 2D shape or footprint.
        meaning: ifcowl:IfcQuantityLength
      count:
        description: Discrete count of items, storeys, or occurrences.
        meaning: pbs:quantity_type_count
      ratio:
        description: Dimensionless quotient of two measured quantities.
        meaning: pbs:quantity_type_ratio
  StatusType:
    enum_uri: pbs:StatusType
    description: Lifecycle or QA gate status used for model progression and approvals.
    permissible_values:
      draft:
        description: Work-in-progress state before formal review.
        meaning: pbs:status_draft
      submitted:
        description: Submitted state for review or approval.
        meaning: pbs:status_submitted
      reviewed:
        description: Reviewed state pending final approval decision.
        meaning: pbs:status_reviewed
      approved:
        description: Approved state accepted for downstream use.
        meaning: pbs:status_approved
      rejected:
        description: Rejected state not accepted for downstream use.
        meaning: pbs:status_rejected
      archived:
        description: Archived state no longer in use.
        meaning: pbs:status_archived
  LawfulBasis:
    enum_uri: pbs:LawfulBasis
    description: Lawful basis for processing personal data, aligned with GDPR Article 6 and similar regimes.
    permissible_values:
      consent:
        description: Data subject has given consent for one or more specific purposes.
        meaning: pbs:lawful_basis_consent
        title: Consent
        alt_descriptions:
          de:
            source: de
            description: Einwilligung
      contract:
        description: Processing is necessary for the performance of a contract or pre-contractual steps.
        meaning: pbs:lawful_basis_contract
        title: Contract
        alt_descriptions:
          de:
            source: de
            description: Vertrag
      legal_obligation:
        description: Processing is necessary to comply with a legal obligation.
        meaning: pbs:lawful_basis_legal_obligation
        title: Legal obligation
        alt_descriptions:
          de:
            source: de
            description: Rechtliche Verpflichtung
      vital_interest:
        description: Processing is necessary to protect vital interests of the data subject or another person.
        meaning: pbs:lawful_basis_vital_interest
        title: Vital interest
        alt_descriptions:
          de:
            source: de
            description: Lebenswichtiges Interesse
      public_task:
        description: Processing is necessary for the performance of a task carried out in the public interest.
        meaning: pbs:lawful_basis_public_task
        title: Public task
        alt_descriptions:
          de:
            source: de
            description: Öffentliche Aufgabe
      legitimate_interest:
        description: Processing is necessary for legitimate interests pursued by the controller or a third party.
        meaning: pbs:lawful_basis_legitimate_interest
        title: Legitimate interest
        alt_descriptions:
          de:
            source: de
            description: Berechtigtes Interesse
  PersonalDataProcessingState:
    enum_uri: pbs:PersonalDataProcessingState
    description: Privacy handling state for personal data on a Person record, orthogonal to workflow QA status.
    permissible_values:
      active:
        description: Identifiable personal data is present and actively processed.
        meaning: pbs:personal_data_processing_state_active
        title: Active
        alt_descriptions:
          de:
            source: de
            description: Aktiv
      redacted:
        description: Identifying values removed or replaced; record kept for referential integrity.
        meaning: pbs:personal_data_processing_state_redacted
        title: Redacted
        alt_descriptions:
          de:
            source: de
            description: Redigiert
      pseudonymized:
        description: Only indirect identifiers remain, such as a role label without direct contact details.
        meaning: pbs:personal_data_processing_state_pseudonymized
        title: Pseudonymized
        alt_descriptions:
          de:
            source: de
            description: Pseudonymisiert
      anonymized:
        description: Data is no longer relatable to an identifiable individual.
        meaning: pbs:personal_data_processing_state_anonymized
        title: Anonymized
        alt_descriptions:
          de:
            source: de
            description: Anonymisiert
      erasure_pending:
        description: Erasure requested; personal data scheduled for removal after a grace period.
        meaning: pbs:personal_data_processing_state_erasure_pending
        title: Erasure pending
        alt_descriptions:
          de:
            source: de
            description: Löschung ausstehend
      erased:
        description: Personal data removed; a minimal stub may remain for referential integrity.
        meaning: pbs:personal_data_processing_state_erased
        title: Erased
        alt_descriptions:
          de:
            source: de
            description: Gelöscht

id: https://schema.pragmaticbim.ch/entity/enums
name: pragmatic_bim_entity_schema_enums
title: Pragmatic BIM Data Contract - Entity Enums
description: Controlled vocabularies for entity graph types, lifecycle, quantities, scheduling, performance properties, and requirement drivers.
license: MIT
see_also:
- https://schema.pragmaticbim.ch/entity/enums
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
default_prefix: pbs
default_range: string
imports:
- linkml:types
enums:
  ContentKind:
    enum_uri: pbs:ContentKind
    description: Entity type discriminator for adapter projection and querying — not a module router.
    permissible_values:
      physical:
        description: Tangible BIM element (SeparatorWall, Equipment, etc.).
        meaning: pbs:content_kind_physical
        title: Physical
        alt_descriptions:
          de:
            source: de
            description: Physisch
      virtual:
        description: Non-physical conceptual entity (Space, System, TimeRecord, CostRecord, etc.).
        meaning: pbs:content_kind_virtual
        title: Virtual
        alt_descriptions:
          de:
            source: de
            description: Virtuell
      context:
        description: Spatial context node (Building, Level, Zone, etc.).
        meaning: pbs:content_kind_context
        title: Context
        alt_descriptions:
          de:
            source: de
            description: Kontext
      project:
        description: Business delivery scope anchoring spatial context and workflow entities.
        meaning: pbs:content_kind_project
        title: Project
        alt_descriptions:
          de:
            source: de
            description: Projekt
      program:
        description: Portfolio or capital program scope grouping related projects.
        meaning: pbs:content_kind_program
        title: Program
        alt_descriptions:
          de:
            source: de
            description: Programm
      product:
        description: Commercial product or service offering sold by a company.
        meaning: pbs:content_kind_product
        title: Product
        alt_descriptions:
          de:
            source: de
            description: Produkt
      deliverable:
        description: Outcome or handover item produced within a project.
        meaning: pbs:content_kind_deliverable
        title: Deliverable
        alt_descriptions:
          de:
            source: de
            description: Lieferobjekt
      requirement:
        description: Prescriptive requirement record.
        meaning: pbs:content_kind_requirement
        title: Requirement
        alt_descriptions:
          de:
            source: de
            description: Anforderung
      artifact:
        description: External project artifact (text document, model, or plan) at storage_link.
        meaning: pbs:content_kind_artifact
        title: Artifact
        alt_descriptions:
          de:
            source: de
            description: Artefakt
      contract:
        description: Commercial agreement entity linking parties, scope, and signed artifacts.
        meaning: pbs:content_kind_contract
        title: Contract
        alt_descriptions:
          de:
            source: de
            description: Vertrag
      decision:
        description: Decision entity for workflow and governance traceability.
        meaning: pbs:content_kind_decision
        title: Decision
        alt_descriptions:
          de:
            source: de
            description: Entscheid
      task:
        description: Task or action entity for implementation workflows.
        meaning: pbs:content_kind_task
        title: Task
        alt_descriptions:
          de:
            source: de
            description: Aufgabe
      process:
        description: Running BPMN process instance for workflow orchestration.
        meaning: pbs:content_kind_process
        title: Process
        alt_descriptions:
          de:
            source: de
            description: Prozess
      agent:
        description: Person, organization, or software actor in the project.
        meaning: pbs:content_kind_agent
        title: Agent
        alt_descriptions:
          de:
            source: de
            description: Akteur
      message:
        description: Message or communication entity for coordination.
        meaning: pbs:content_kind_message
        title: Message
        alt_descriptions:
          de:
            source: de
            description: Nachricht
  ArtifactKind:
    enum_uri: pbs:ArtifactKind
    description: Kind of external project artifact referenced by storage_link.
    permissible_values:
      text_document:

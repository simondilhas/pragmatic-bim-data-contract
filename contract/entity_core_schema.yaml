id: https://schema.pragmaticbim.ch/entity/core
name: pragmatic_bim_entity_core_schema
title: Pragmatic BIM Data Contract - Entity Core
description: 'Core entities and reusable base slots.

  '
license: MIT
see_also:
- https://schema.pragmaticbim.ch/entity/core
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/
  schema: https://schema.org/
  adms: http://www.w3.org/ns/adms#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
default_prefix: pbs
default_range: string
imports:
- linkml:types
- entity_schema_enums
classes:
  Entity:
    abstract: true
    class_uri: pbs:Entity
    description: Common base class for everything in the project graph. Has identity, lifecycle, and status.
    slots:
    - id
    - content_kind
    - name
    - localized_names
    - description
    - meaning_uri
    - localized_descriptions
    - ifc_global_id
    - classifications
    - geometry_representations
    - quantity_values
    - metadata
    - performance_properties
    - applies_to_entities
    - created_at
    - modified_at
    - revision
    - status
    slot_usage:
      id:
        required: true
        identifier: true
      content_kind:
        required: true
  Agent:
    is_a: Entity
    abstract: true
    class_uri: pbs:Agent
    exact_mappings:
    - prov:Agent
    description: Abstract base class for human and software actors in workflow and communication roles.
    slot_usage:
      content_kind:
        equals_string: agent
  Person:
    is_a: Agent
    class_uri: pbs:Person
    exact_mappings:
    - schema:Person
    - prov:Agent
    description: Individual stakeholder, contributor, assignee, or responsible party represented in the schema.
    slots:
    - postal_addresses
    - contact_points
    - belongs_to_company
  Company:
    is_a: Agent
    class_uri: pbs:Company
    exact_mappings:
    - schema:Organization
    - prov:Agent
    description: Organization, company, or legal entity participating in the project or asset lifecycle.
    slots:
    - postal_addresses
    - contact_points
  SoftwareAgent:
    is_a: Agent
    class_uri: pbs:SoftwareAgent
    exact_mappings:
    - prov:SoftwareAgent
    description: Automated actor (integration, bot, or pipeline) acting in workflow roles.
    slots:
    - operated_by
    - software_version
    - service_endpoint
  Classification:
    class_uri: pbs:Classification
    description: Generic classification entry from any scheme (for example IFC, Uniclass, OmniClass, custom).
    slots:
    - classification_scheme
    - classification_code
    - classification_label
    - classification_uri
    - classification_version
    - classification_source
  GeometryRepresentation:
    class_uri: pbs:GeometryRepresentation
    description: Minimal geometry reference for an entity, separating representation from encoding format.
    slots:
    - geometry_reference
    - geometry_representation
    - geometry_format
  QuantityValue:
    class_uri: pbs:QuantityValue
    description: Minimal quantity record for costing and analysis.
    slots:
    - quantity_type
    - quantity_value
    - quantity_unit
    - quantity_unit_uri
  MetadataEntry:
    class_uri: pbs:MetadataEntry
    description: Generic metadata entry for storing IFC attributes, PropertySet fields, or project-specific key-value data.
    slots:
    - metadata_key
    - metadata_value
  PerformanceProperty:
    abstract: true
    class_uri: pbs:PerformanceProperty
    description: 'Normalized performance/property record derived from raw IFC PropertySet values with source traceability
      and strong typing through domain-specific subclasses.

      '
    slots:
    - property_key
    - property_value_type
    - property_value_string
    - property_value_number
    - property_value_boolean
    - property_unit
    - property_unit_uri
    - source_pset
    - source_property
    - source_value_raw
    - mapping_version
  Decision:
    is_a: Entity
    class_uri: pbs:Decision
    exact_mappings:
    - prov:Entity
    description: 'Decision entity for workflow traceability and governance. Entity.status covers lifecycle; decision_status
      uses workflow vocabulary URIs.

      '
    slots:
    - decision_type
    - decision_status
    - decided_by
    - decided_at
    - rationale
    slot_usage:
      content_kind:
        equals_string: decision
  Task:
    is_a: Entity
    class_uri: pbs:Task
    exact_mappings:
    - schema:Action
    - prov:Activity
    description: 'Task entity for implementation and follow-up workflows. Entity.status covers lifecycle; task_status uses
      action status vocabulary URIs. Links to related entities via applies_to_entities.

      '
    slots:
    - task_type
    - task_status
    - assignee
    - due_at
    - related_decision
    - parent_process
    - task_notes
    slot_usage:
      content_kind:
        equals_string: task
  Process:
    is_a: Entity
    class_uri: pbs:Process
    description: 'Running BPMN process instance in the project graph. Use process_definition_uri for the
      BPMN definition key or artifact. When orchestration state lives in an external engine, set
      external_instance_uri to that system of record.

      '
    slots:
    - process_definition_uri
    - external_instance_uri
    - process_status
    - started_at
    - completed_at
    - process_participants
    - parent_project
    slot_usage:
      content_kind:
        equals_string: process
      process_definition_uri:
        required: true
  Message:
    is_a: Entity
    class_uri: pbs:Message
    exact_mappings:
    - schema:Message
    - prov:Entity
    description: Message entity for coordination and traceability. Links to related entities via applies_to_entities.
    slots:
    - message_type
    - sender
    - recipients
    - sent_at
    - message_subject
    - message_body
    slot_usage:
      content_kind:
        equals_string: message
  Artifact:
    is_a: Entity
    class_uri: pbs:Artifact
    exact_mappings:
    - schema:CreativeWork
    description: 'External project artifact (text document, model, or plan) at storage_link. Used for provenance
      (Requirement.source_artifact). Not a modeled building element.

      '
    slots:
    - classifications
    - storage_link
    - artifact_kind
    - media_format
    slot_usage:
      content_kind:
        equals_string: artifact
      id:
        required: true
      artifact_kind:
        required: true
  Contract:
    is_a: Entity
    class_uri: pbs:Contract
    description: 'Commercial agreement entity for project scope, parties, and governance. Links to a signed artifact
      and related model entities via applies_to_entities. Entity.status covers record lifecycle; contract_status uses
      workflow vocabulary URIs.

      '
    slots:
    - contract_type
    - contract_status
    - contract_parties
    - contract_reference
    - signed_artifact
    - signed_at
    - effective_from
    - effective_until
    slot_usage:
      content_kind:
        equals_string: contract
  Project:
    is_a: Entity
    class_uri: pbs:Project
    exact_mappings:
    - ifcowl:IfcProject
    description: Business delivery scope for spatial context, systems, and workflow entities.
    slots:
    - project_code
    - client
    - parent_program
    slot_usage:
      content_kind:
        equals_string: project
      parent_program:
        range: Program
  Program:
    is_a: Entity
    class_uri: pbs:Program
    tree_root: true
    description: Portfolio or capital program scope grouping related projects.
    slots:
    - program_code
    - client
    slot_usage:
      content_kind:
        equals_string: program
  Product:
    is_a: Entity
    class_uri: pbs:Product
    description: Commercial product or service offering sold by a company.
    slots:
    - product_code
    - vendor
    - catalog_cost_records
    slot_usage:
      content_kind:
        equals_string: product
      catalog_cost_records:
        range: CostRecord
  Deliverable:
    is_a: Entity
    class_uri: pbs:Deliverable
    description: Outcome or handover item produced within a project.
    slots:
    - deliverable_code
    - parent_project
    - related_product
    slot_usage:
      content_kind:
        equals_string: deliverable
      parent_project:
        range: Project
      related_product:
        range: Product
  PostalAddress:
    class_uri: pbs:PostalAddress
    exact_mappings:
    - schema:PostalAddress
    description: Structured postal or physical address for an agent.
    slots:
    - street_address
    - post_office_box_number
    - postal_code
    - address_locality
    - address_region
    - address_country
    - address_country_code
  ContactPoint:
    class_uri: pbs:ContactPoint
    exact_mappings:
    - schema:ContactPoint
    description: Structured communication endpoint or profile for an agent.
    slots:
    - contact_channel_type
    - contact_value
    - contact_uri
    - usage_context
    - is_preferred
    - availability_notes
  LocalizedText:
    class_uri: pbs:LocalizedText
    description: Localized text value for a specific language tag.
    slots:
    - language_tag
    - text_value
slots:
  id:
    identifier: true
    required: true
    range: string
    description: Unique local identifier.
  content_kind:
    range: string
    required: true
    description: Entity type discriminator for adapter projection and querying. Must be a ContentKind value.
  name:
    required: true
    range: string
    description: Default display name.
  description:
    range: string
    description: Default description text.
  meaning_uri:
    range: uriorcurie
    description: Optional semantic URI for linking the entity instance to an external ontology concept.
  localized_names:
    multivalued: true
    range: LocalizedText
    inlined: true
    description: Localized variants of name.
  localized_descriptions:
    multivalued: true
    range: LocalizedText
    inlined: true
    description: Localized variants of description.
  tags:
    multivalued: true
    range: string
    description: Optional free-form labels for filtering/grouping.
  ifc_global_id:
    range: string
    pattern: ^[0-3][0-9A-Za-z_$]{21}$
    description: IFC GlobalId of the mapped entity.
  parent_building:
    range: Entity
    description: Parent building context reference.
  parent_level:
    range: Entity
    description: Parent level/storey context reference.
  applies_to_entities:
    multivalued: true
    range: Entity
    inlined: false
    description: Model entities this record applies to (requirements, cost items, schedule items, etc.).
  classifications:
    multivalued: true
    range: Classification
    inlined: true
    description: Classification entries from IFC and other schemes.
  geometry_representations:
    multivalued: true
    range: GeometryRepresentation
    inlined: true
    description: 'Geometry references associated with the entity. A single element may link to multiple geometry representations
      to serve different intents (authoring, coordination, analysis, visualization) without duplicating the element itself.

      '
  quantity_values:
    multivalued: true
    range: QuantityValue
    inlined: true
    description: Quantities associated with the entity.
  metadata:
    multivalued: true
    range: MetadataEntry
    inlined: true
    description: Generic metadata container for IFC attributes/properties and project-specific extensions.
  performance_properties:
    multivalued: true
    range: PerformanceProperty
    inlined: true
    description: 'Normalized, strongly typed domain properties (fire/acoustic/thermal/structural/ security/material) extracted
      from raw IFC PropertySet values.

      '
  postal_addresses:
    multivalued: true
    range: PostalAddress
    inlined: true
    description: Structured postal or physical addresses associated with this agent.
  contact_points:
    multivalued: true
    range: ContactPoint
    inlined: true
    description: Structured communication channels and profiles associated with this agent.
  belongs_to_company:
    range: Company
    inlined: false
    description: Optional company that the person belongs to.
  operated_by:
    range: Company
    inlined: false
    description: Organization accountable for this software agent.
  software_version:
    range: string
    description: Optional deployed version label for the software agent.
  service_endpoint:
    range: uriorcurie
    description: Optional URI of the running service or integration endpoint.
  decision_type:
    range: uriorcurie
    slot_uri: dcterms:type
    description: Decision type expressed as a URI/CURIE from a controlled vocabulary.
  decision_status:
    range: uriorcurie
    slot_uri: adms:status
    description: Decision status expressed as a URI/CURIE (for example proposed, accepted, rejected, superseded).
  decided_by:
    range: Agent
    slot_uri: prov:wasAttributedTo
    inlined: false
    description: Agent responsible for the decision.
  decided_at:
    range: datetime
    slot_uri: dcterms:created
    description: Timestamp when the decision was made.
  rationale:
    range: string
    slot_uri: dcterms:description
    description: Human-readable rationale that explains why the decision was made.
  task_type:
    range: uriorcurie
    slot_uri: dcterms:type
    description: Task type expressed as a URI/CURIE from a controlled vocabulary.
  task_status:
    range: uriorcurie
    slot_uri: schema:actionStatus
    description: Task status URI/CURIE aligned with action status vocabularies.
  assignee:
    range: Agent
    slot_uri: schema:agent
    inlined: false
    description: Responsible agent.
  due_at:
    range: datetime
    slot_uri: schema:deadline
    description: Due timestamp for task completion.
  related_decision:
    range: Decision
    inlined: false
    slot_uri: prov:used
    description: Optional reference to a decision that informs or drives this task.
  parent_process:
    range: Process
    inlined: false
    description: Optional BPMN process instance that owns or spawned this task.
  task_notes:
    range: string
    slot_uri: rdfs:comment
    description: Additional notes or implementation details for the task.
  message_type:
    range: uriorcurie
    slot_uri: dcterms:type
    description: Message type expressed as a URI/CURIE from a controlled vocabulary.
  sender:
    range: Agent
    slot_uri: schema:sender
    inlined: false
    description: Agent that sent the message.
  recipients:
    multivalued: true
    range: Agent
    slot_uri: schema:recipient
    inlined: false
    description: Agents that received the message.
  sent_at:
    range: datetime
    slot_uri: schema:dateSent
    description: Timestamp when the message was sent.
  message_subject:
    range: string
    slot_uri: schema:headline
    description: Optional subject or headline for the message.
  message_body:
    range: string
    slot_uri: schema:text
    description: Human-readable message content.
  street_address:
    range: string
    slot_uri: schema:streetAddress
    description: Street name and house number or equivalent address line.
  post_office_box_number:
    range: string
    slot_uri: schema:postOfficeBoxNumber
    description: Post office box number where applicable.
  postal_code:
    range: string
    slot_uri: schema:postalCode
    description: Postal or ZIP code.
  address_locality:
    range: string
    slot_uri: schema:addressLocality
    description: Locality, city, or town.
  address_region:
    range: string
    slot_uri: schema:addressRegion
    description: Region, state, canton, or province.
  address_country:
    range: string
    slot_uri: schema:addressCountry
    description: Country name.
  address_country_code:
    range: string
    description: Optional ISO 3166-1 alpha-2 or alpha-3 country code.
  contact_channel_type:
    range: string
    description: Communication channel type such as email, phone, website, linkedin, whatsapp, signal, slack, teams, or telegram.
  contact_value:
    range: string
    description: Human-readable contact value such as an email address, phone number, handle, or username.
  contact_uri:
    range: uriorcurie
    description: URI for the contact endpoint or profile where applicable.
  usage_context:
    range: string
    description: Optional usage context such as work, personal, support, billing, or emergency.
  is_preferred:
    range: boolean
    description: Indicates whether this is the preferred contact point.
  availability_notes:
    range: string
    description: Optional notes about availability, office hours, or response expectations.
  created_at:
    range: datetime
    description: Creation timestamp for this entity record.
  modified_at:
    range: datetime
    description: Last modification timestamp for this entity record.
  revision:
    range: integer
    minimum_value: 0
    description: Integer revision counter for change tracking.
  status:
    range: StatusType
    description: Lifecycle or QA status.
  classification_scheme:
    range: string
    required: true
    description: Name of the classification scheme (for example ifc, uniclass, omniclass, custom).
  classification_code:
    range: string
    required: true
    description: Classification code inside the scheme.
  classification_label:
    range: string
    description: Optional human-readable classification label.
  classification_uri:
    range: uriorcurie
    description: Optional URI/CURIE that identifies the classification concept in an external registry.
  classification_version:
    range: string
    description: Optional scheme/version identifier.
  classification_source:
    range: string
    description: Source authority or dataset for this classification.
  language_tag:
    range: string
    required: true
    description: IETF BCP 47 language tag (for example en, de, pt-BR).
  text_value:
    range: string
    required: true
    description: Localized text value.
  geometry_reference:
    range: string
    required: true
    description: URI/path/hash/pointer to geometry payload.
  geometry_representation:
    range: GeometryRepresentationType
    required: true
    description: Representation kind/dimension (for example body_3d, footprint_2d, point), independent of file format.
  geometry_format:
    range: string
    description: Optional serialization/encoding format (for example ifc, gltf, wkt, geojson), independent of representation
      kind.
  quantity_type:
    range: QuantityType
    required: true
    description: Controlled quantity type.
  quantity_value:
    range: double
    required: true
    minimum_value: 0
    description: Numeric quantity value.
  quantity_unit:
    range: string
    required: true
    description: Unit of the quantity value.
  quantity_unit_uri:
    range: uriorcurie
    description: Optional URI that identifies the quantity unit in an external vocabulary such as QUDT.
  metadata_key:
    range: string
    required: true
    description: Metadata key, for example IfcWall.FireRating or Pset_WallCommon.Reference.
  metadata_value:
    range: string
    description: Metadata value serialized as text.
  property_key:
    range: string
    required: true
    description: Canonical key inside the domain; constrained via subclass slot_usage to a domain-specific enum.
  property_value_type:
    range: PerformancePropertyValueType
    required: true
    description: Value type discriminator for normalized storage (for example string, number, boolean).
  property_value_string:
    range: string
    description: String value when property_value_type is string.
  property_value_number:
    range: double
    description: Numeric value when property_value_type is number.
  property_value_boolean:
    range: boolean
    description: Boolean value when property_value_type is boolean.
  property_unit:
    range: string
    description: Normalized unit where applicable (for example min, dB, W/m2K).
  property_unit_uri:
    range: uriorcurie
    description: Optional URI that identifies the normalized property unit in an external vocabulary such as QUDT.
  source_pset:
    range: string
    description: Original IFC PropertySet name (for example Pset_WallCommon).
  source_property:
    range: string
    description: Original property name inside the source PropertySet (for example FireRating).
  source_value_raw:
    range: string
    description: Raw source value before normalization.
  mapping_version:
    range: string
    description: Mapping specification version used to derive the normalized property.
  artifact_kind:
    range: ArtifactKind
    required: true
    description: Kind of external artifact (text document, model, or plan).
  media_format:
    range: string
    description: Encoding or format label (for example IFC4, PDF, DWG).
  storage_link:
    range: uriorcurie
    required: true
    description: URI/URL/path to the stored artifact location.
  contract_type:
    range: uriorcurie
    slot_uri: dcterms:type
    description: Contract type expressed as a URI/CURIE from a controlled vocabulary (for example design, construction, supply).
  contract_status:
    range: uriorcurie
    slot_uri: adms:status
    description: Contract status expressed as a URI/CURIE (for example draft, signed, active, terminated, superseded).
  contract_parties:
    multivalued: true
    range: Agent
    inlined: false
    description: Agents party to the contract (for example client, contractor, consultant).
  contract_reference:
    range: string
    description: Human-readable contract number or external reference.
  signed_artifact:
    range: Artifact
    inlined: false
    description: Optional signed contract artifact at storage_link.
  signed_at:
    range: datetime
    description: Timestamp when the contract was signed.
  effective_from:
    range: datetime
    description: Start of contractual validity.
  effective_until:
    range: datetime
    description: End of contractual validity when applicable.
  project_code:
    range: string
    description: External or internal project identifier.
  client:
    range: Company
    inlined: false
    description: Owning client organization.
  program_code:
    range: string
    description: External or internal program identifier.
  product_code:
    range: string
    description: External or internal product catalog identifier.
  vendor:
    range: Company
    inlined: false
    description: Company that sells or offers this product.
  deliverable_code:
    range: string
    description: External or internal deliverable identifier within a project.
  related_product:
    range: Product
    inlined: false
    description: Optional catalog product this deliverable implements or this cost record is priced from.
  catalog_cost_records:
    multivalued: true
    range: CostRecord
    inlined: false
    description: Catalog cost and price records for this product (cost_record_role cost or price).
  parent_program:
    range: Program
    inlined: false
    description: Parent program reference.
  process_definition_uri:
    range: uriorcurie
    required: true
    description: URI identifying the BPMN process definition (for example engine definition key or BPMN artifact URI).
  external_instance_uri:
    range: uriorcurie
    description: URI of the corresponding process instance in an external workflow engine when applicable.
  process_status:
    range: uriorcurie
    slot_uri: adms:status
    description: Process instance status expressed as a URI/CURIE (for example active, suspended, completed, terminated).
  started_at:
    range: datetime
    slot_uri: dcterms:created
    description: Timestamp when the process instance started.
  completed_at:
    range: datetime
    description: Timestamp when the process instance completed or terminated, when applicable.
  process_participants:
    multivalued: true
    range: Agent
    inlined: false
    description: Agents participating in this BPMN process instance (for example assignees mapped from lane roles).

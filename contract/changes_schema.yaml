id: https://schema.pragmaticbim.ch/changes
name: pragmatic_bim_changes_schema
title: Pragmatic BIM Data Contract - Changes
description: 'Change detection and revision diff records for IFC models, documents, and schema entity fields.

  '
license: MIT
see_also:
- https://schema.pragmaticbim.ch/changes
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/
default_prefix: pbs
default_range: string
imports:
- linkml:types
- changes_schema_enums
- entity_schema_enums
- entity_core_schema
- entity_requirements_schema
classes:
  Change:
    abstract: true
    class_uri: pbs:Change
    description: 'Audit record observing the project graph moving between revisions. Not an Entity and not a graph node —
      it watches the graph. Use change_type together with the concrete subclass for interpretation.

      '
    slots:
    - id
    - change_type
    - change_severity
    - intent_verdict
    - affected_subject
    - affected_subject_id
    - affected_subject_type
    - affected_subject_path
    - ifc_global_id
    - artifact_storage_link
    - from_revision
    - to_revision
    - triggered_task
    - triggered_process
    - detected_at
    - change_source
    slot_usage:
      id:
        required: true
        identifier: true
      change_type:
        required: true
      affected_subject_id:
        required: true
      affected_subject_type:
        required: true
      from_revision:
        required: true
      to_revision:
        required: true
  PropertyChange:
    is_a: Change
    class_uri: pbs:PropertyChange
    exact_mappings:
    - prov:Activity
    description: Attribute, PropertySet, schema slot, or document field change.
    slots:
    - property_path
    - property_path_kind
    - from_value
    - to_value
    - source_pset
    - source_property
    - ifc_attribute_name
    slot_usage:
      property_path:
        required: true
      property_path_kind:
        required: true
      source_pset:
        description: IFC PropertySet name when property_path_kind is ifc_pset.
      source_property:
        description: IFC property name within the PropertySet when property_path_kind is ifc_pset.
  GeometryChange:
    is_a: Change
    class_uri: pbs:GeometryChange
    exact_mappings:
    - prov:Activity
    description: Geometry or representation change for a subject.
    slots:
    - affected_geometry_role
  RequirementChange:
    is_a: Change
    class_uri: pbs:RequirementChange
    exact_mappings:
    - prov:Activity
    description: Change to a requirement entity or its fields.
    slots:
    - affected_requirement
    - property_path
    - property_path_kind
    - from_value
    - to_value
  MatchChange:
    is_a: Change
    class_uri: pbs:MatchChange
    exact_mappings:
    - prov:Activity
    description: 'Entity match status against a requirement changed (previously met / no longer meets).

      '
    slots:
    - related_requirement
    - match_status
  AdditionChange:
    is_a: Change
    class_uri: pbs:AdditionChange
    exact_mappings:
    - prov:Activity
    description: New entity introduced in to_revision.
  DeletionChange:
    is_a: Change
    class_uri: pbs:DeletionChange
    exact_mappings:
    - prov:Activity
    description: Entity removed in to_revision.
slots:
  property_path:
    range: string
    required: true
    description: 'Canonical path to the changed field. Examples: Pset_WallCommon.FireRating, IfcWall.Name, description, section.4.2.requirement_3,
      body:char_offset:1204-1389.

      '
  property_path_kind:
    range: PropertyPathKind
    required: true
    description: Classification of the property path for downstream diff interpretation.
  from_value:
    range: string
    description: Prior value serialized as text. Absent or null for new subjects or fields.
  to_value:
    range: string
    description: New value serialized as text. Absent or null for deleted subjects or fields.
  ifc_attribute_name:
    range: string
    description: IFC attribute name when property_path_kind is ifc_attribute (for example Name, GlobalId).
  change_type:
    range: ChangeType
    required: true
    description: Category of change detected between two revisions.
  change_severity:
    range: ChangeSeverity
    description: Optional severity independent of change type.
  intent_verdict:
    range: ChangeIntentVerdict
    description: Intent stability verdict from an automated judge (for example iterthink STABLE/NEW).
  affected_subject:
    range: Entity
    inlined: false
    description: Optional typed reference to the changed graph entity when the subject is in the project graph.
  affected_subject_id:
    range: string
    required: true
    description: Identifier of the changed subject (entity id, document id, or external key).
  affected_subject_type:
    range: string
    required: true
    description: 'LinkML class name of the changed subject (for example Space, SeparatorWall, Artifact).

      '
  affected_subject_path:
    range: string
    description: 'Optional JSON-pointer-style path for nested targets (for example localized_descriptions[de], section.4.2.paragraph_1).

      '
  artifact_storage_link:
    range: uriorcurie
    description: Artifact location when the subject is an Artifact entity or embedded field diff.
  from_revision:
    range: integer
    minimum_value: 0
    required: true
    description: Source revision number for this change.
  to_revision:
    range: integer
    minimum_value: 0
    required: true
    description: Target revision number for this change.
  affected_geometry_role:
    range: GeometryRepresentationType
    description: Geometry role affected for GeometryChange records.
  affected_requirement:
    range: Requirement
    inlined: false
    description: Requirement entity affected by this change.
  related_requirement:
    range: Requirement
    inlined: false
    required: true
    description: Requirement entity for match_change records.
  match_status:
    range: MatchStatus
    required: true
    description: Whether the subject met the requirement at the target revision.
  triggered_task:
    range: Task
    inlined: false
    description: Task entity that this change triggered or should trigger.
  triggered_process:
    range: Process
    inlined: false
    description: BPMN process instance that this change triggered or should trigger.
  detected_at:
    range: datetime
    slot_uri: dcterms:created
    description: Timestamp when this change was detected.
  change_source:
    range: uriorcurie
    description: URI identifying the tool or pipeline that produced this change record.

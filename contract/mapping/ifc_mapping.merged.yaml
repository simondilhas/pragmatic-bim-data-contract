        separator_slab_type: roof
      BASESLAB:
        canonical_type: SeparatorSlab.baseslab
        separator_slab_type: baseslab
      LANDING:
        canonical_type: SeparatorSlab.floor
        separator_slab_type: floor
      APPROACH_SLAB:
        canonical_type: SeparatorSlab.floor
        separator_slab_type: floor
      PAVING:
        canonical_type: SeparatorSlab.floor

      classifications: *classifications_mapping
    attributes:
      <<: *attributes_entity_base
      connection_physical_type:
        source: constant
        value: network_other
      transport_medium:
        source: constant
        value: air
    geometry: *geometry_body_footprint
    relations:
      - IfcRelContainedInSpatialStructure

id: https://schema.pragmaticbim.ch/entity/requirements
name: pragmatic_bim_entity_requirements_schema
title: Pragmatic BIM Data Contract - Entity Requirements
description: 'Prescriptive requirement records and element-level requirement-driver slots.

  '
license: MIT
see_also:
- https://schema.pragmaticbim.ch/entity/requirements
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
default_prefix: pbs
default_range: string
imports:
- linkml:types
- entity_core_schema
- entity_schema_enums
classes:
  Requirement:
    is_a: Entity
    abstract: true
    class_uri: pbs:Requirement
    description: 'Prescriptive requirement entity (content_kind requirement). Applies to model entities via applies_to_entities.
      Domain is discriminated by concrete subclass (PerformanceRequirement, SpatialRequirement, DeliverableRequirement, etc.),
      not a separate slot.

      '
    slots:
    - source_artifact
    slot_usage:
      content_kind:
        equals_string: requirement
  PerformanceRequirement:
    is_a: Requirement
    class_uri: pbs:PerformanceRequirement
    description: >-
      Performance target requirement (U-value, fire rating, airflow, acoustic, etc.).
      Boolean targets use target_value_boolean with requirement_property_key aligned to
      entity slot names where applicable (for example is_heated on Space). Application
      pipelines compare the subject entity slot to the requirement target and record
      the outcome as MatchChange (match_status met, unmet, or unknown).
    slots:
    - requirement_property_key
    - target_operator
    - target_value_string
    - target_value_number
    - target_value_boolean
    - target_unit
    - target_unit_uri
  SpatialRequirement:
    is_a: Requirement
    class_uri: pbs:SpatialRequirement
    description: Spatial constraint requirement (min area, min height, adjacency, etc.).
    slots:
    - min_area
    - min_height
    - adjacency_kind
    - related_entity
    - min_clear_distance
  RegulatoryRequirement:
    is_a: Requirement
    class_uri: pbs:RegulatoryRequirement
    description: Regulatory reference requirement (building code, norm, standard).
    slots:
    - norm_uri
    - clause_ref
    - jurisdiction
  BriefRequirement:
    is_a: Requirement
    class_uri: pbs:BriefRequirement
    description: Client or programme requirement, including free-standing brief items.
    slots:
    - programme_ref
    - statement
  DeliverableRequirement:
    is_a: Requirement
    class_uri: pbs:DeliverableRequirement
    description: Deliverable or documentation requirement (model LOD, O&M manual, export format, etc.).
    slots:
    - deliverable_kind
    - deliverable_format
    - due_at
    - acceptance_criteria
  ScheduleRequirement:
    is_a: Requirement
    class_uri: pbs:ScheduleRequirement
    description: Schedule obligation requirement (deadline, milestone, or start/finish window).
    slots:
    - due_at
    - earliest_start_at
    - related_time_record
  CostRequirement:
    is_a: Requirement
    class_uri: pbs:CostRequirement
    description: Cost or budget requirement (unit-cost cap, total budget limit, etc.).
    slots:
    - cost_category
    - target_operator
    - target_value_number
    - currency
    - cost_quantity_type
  MaterialRequirement:
    is_a: Requirement
    class_uri: pbs:MaterialRequirement
    description: Material or product specification requirement for matching against assigned materials.
    slots:
    - material_category
    - material_specification
    - related_material
    - substitutes_allowed
slots:
  separator_requirement_drivers:
    multivalued: true
    range: SeparatorRequirementDriver
    description: 'Performance requirement drivers for this separator. Multiple values are allowed because one separator may
      need to satisfy several requirements.

      '
  connection_physical_requirement_drivers:
    multivalued: true
    range: ConnectionRequirementDriver
    description: 'Performance requirement drivers for this physical connection element. Multiple values are allowed because
      one connection may need to satisfy several requirements.

      '
  connection_virtual_requirement_drivers:
    multivalued: true
    range: ConnectionRequirementDriver
    description: Main requirement drivers for this virtual connection.
  source_artifact:
    range: Artifact
    inlined: false
    description: Optional source artifact backing this requirement.
  requirement_property_key:
    range: string
    required: true
    description: 'Canonical performance key for the target (for example u_value, resistance_rating). Aligns with performance
      property keys where applicable.

      '
  target_operator:
    range: RequirementTargetOperator
    description: Comparison operator for the requirement target.
  target_value_string:
    range: string
    description: Textual target value when applicable.
  target_value_number:
    range: double
    description: Numeric target value when applicable.
  target_value_boolean:
    range: boolean
    description: Boolean target value when applicable.
  target_unit:
    range: string
    description: Unit for numeric targets (for example W/m2K, min, dB).
  target_unit_uri:
    range: uriorcurie
    description: Optional URI identifying the target unit (for example QUDT).
  min_area:
    range: double
    minimum_value: 0
    description: Minimum required area in square metres.
  min_height:
    range: double
    minimum_value: 0
    description: Minimum required height or clear height in metres.
  adjacency_kind:
    range: SpatialAdjacencyKind
    description: Adjacency semantics when this spatial requirement involves another subject.
  related_entity:
    range: Entity
    inlined: false
    description: Entity or space subject for adjacency or distance constraints.
  min_clear_distance:
    range: double
    minimum_value: 0
    description: Minimum clear distance in metres when adjacency_kind is min_clear_distance.
  norm_uri:
    range: uriorcurie
    description: URI identifying the norm, standard, or building code.
  clause_ref:
    range: string
    description: Clause, article, or section reference within the norm.
  jurisdiction:
    range: string
    description: Jurisdiction or authority scope for the regulatory requirement.
  programme_ref:
    range: uriorcurie
    description: URI or identifier for a programme or brief document.
  statement:
    range: string
    description: Free-text requirement statement from client or programme.
  deliverable_kind:
    range: string
    description: Deliverable type label (for example coordination model, O&M manual, as-built record).
  deliverable_format:
    range: string
    description: Required deliverable format or encoding (for example IFC4, PDF, COBie).
  acceptance_criteria:
    range: string
    description: Criteria that define when the deliverable is accepted.
  earliest_start_at:
    range: datetime
    description: Earliest permitted start when a schedule requirement defines a start window.
  related_time_record:
    range: Entity
    inlined: false
    description: Optional TimeRecord plan item this schedule requirement aligns with or must satisfy.
  related_material:
    range: Entity
    inlined: false
    description: Optional Material entity template this requirement must match or satisfy.
  substitutes_allowed:
    range: boolean
    description: Whether equivalent or substitute materials are permitted.

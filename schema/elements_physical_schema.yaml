id: https://example.org/pragmatic-bim-schema/elements-physical
name: pragmatic_bim_elements_physical_schema
title: Pragmatic BIM Schema - Elements Physical
description: >
  Physical element hierarchy and element-related slots.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://example.org/pragmatic-bim-schema/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#

default_prefix: pbs
default_range: string

imports:
  - linkml:types
  - requirements_schema.yaml

classes:
  PhysicalElement:
    is_a: Entity
    abstract: true
    class_uri: pbs:PhysicalElement
    exact_mappings:
      - bot:Element
      - ifcowl:IfcElement
    description: Base class for physical elements that can be placed in built asset/level context.
    slots:
      - parent_building
      - parent_level
    slot_usage:
      parent_building:
        range: BuiltAssetContext
      parent_level:
        range: LevelContext

  Separator:
    is_a: PhysicalElement
    class_uri: pbs:Separator
    abstract: true
    exact_mappings:
      - ifcowl:IfcBuildingElement
    description: Abstract base class for elements that separate spaces or zones.
    slots:
      - separator_requirement_drivers

  SeparatorWall:
    is_a: Separator
    class_uri: pbs:SeparatorWall
    exact_mappings:
      - ifcowl:IfcWall
    description: Wall-based separating element.
    slots:
      - separator_wall_type
      - separates_spaces

  SeparatorSlab:
    is_a: Separator
    class_uri: pbs:SeparatorSlab
    exact_mappings:
      - ifcowl:IfcSlab
    description: Slab-based separating element (for example floor/roof/base slab separators).
    slots:
      - separator_slab_type
      - separates_levels

  ConnectionPhysical:
    is_a: PhysicalElement
    class_uri: pbs:ConnectionPhysical
    exact_mappings:
      - ifcowl:IfcDoor
      - ifcowl:IfcWindow
    description: Physical opening element providing functional connection between spaces (for example door or window).
    slots:
      - connection_physical_type
      - connection_physical_requirement_drivers

  Boundary:
    is_a: PhysicalElement
    class_uri: pbs:Boundary
    exact_mappings:
      - ifcowl:IfcCovering
    description: Physical element acting as a boundary treatment (for example covering).
    slots:
      - boundary_type
      - bounded_space

  Equipment:
    is_a: PhysicalElement
    class_uri: pbs:Equipment
    exact_mappings:
      - bot:Element
      - ifcowl:IfcDistributionElement
    description: Equipment item that is located in a space and assigned to a system.
    slots:
      - equipment_type
      - parent_space
      - parent_system

slots:
  connection_physical_type:
    range: ConnectionPhysicalType
    required: true
    description: Classification of physical opening element type (for example door, window).

  separator_wall_type:
    range: SeparatorWallType
    required: true
    description: Classification of wall-based separator element.

  separator_slab_type:
    range: SeparatorSlabType
    required: true
    description: Classification of slab-based separator element (for example floor/roof/base slab).

  boundary_type:
    range: BoundaryType
    required: true
    description: Classification of boundary element (e.g., covering).

  separates_spaces:
    multivalued: true
    range: Space
    description: Spaces separated by this separator element.

  separates_levels:
    multivalued: true
    range: LevelContext
    description: Level context nodes separated by this slab separator.

  bounded_space:
    range: Space
    inverse: bounded_by
    description: Space bounded by this boundary element.

  equipment_type:
    range: EquipmentType
    required: true
    description: Classification of equipment (for example HVAC, electrical, plumbing).

  parent_space:
    range: Space
    inverse: contained_entities
    description: Parent space where the equipment is located.

  parent_system:
    multivalued: true
    range: System
    inverse: contained_entities
    description: Parent systems that the equipment belongs to.


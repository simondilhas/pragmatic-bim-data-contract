id: https://example.org/pragmatic-bim-schema
name: pragmatic_bim_schema
title: Pragmatic BIM Schema
description: >
  To provide a simple, implementation-ready BIM data model for integration,
  querying, costing, and analysis workflows, this schema defines a pragmatic,
  graph-first LinkML structure that is IFC-aware and extensible across
  classification schemes.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://example.org/pragmatic-bim-schema/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#

default_prefix: pbs
default_range: string

imports:
  - linkml:types

classes:
  Entity:
    abstract: true
    class_uri: pbs:Entity
    description: Common base class for all schema entities.
    slots:
      - id
      - name
      - localized_names
      - description
      - meaning_uri
      - localized_descriptions
      - ifc_global_id
      - classifications
      - geometry_representations
      - quantity_values

  Classification:
    class_uri: pbs:Classification
    description: Generic classification entry from any scheme (for example IFC, Uniclass, OmniClass, custom).
    slots:
      - classification_scheme
      - classification_code
      - classification_label
      - classification_version
      - classification_source

  LocalizedText:
    class_uri: pbs:LocalizedText
    description: Localized text value for a specific language tag.
    slots:
      - language_tag
      - text_value

  GeometryRepresentation:
    class_uri: pbs:GeometryRepresentation
    description: Minimal geometry reference for an entity.
    slots:
      - geometry_reference
      - geometry_format

  QuantityValue:
    class_uri: pbs:QuantityValue
    description: Minimal quantity record for costing and analysis.
    slots:
      - quantity_type
      - quantity_value
      - quantity_unit

  ContextEntity:
    is_a: Entity
    class_uri: pbs:ContextEntity
    exact_mappings:
      - ifcowl:IfcSpatialStructureElement
    description: Context node used to represent project, perimeter, building, level, or zone.
    tree_root: true
    slots:
      - context_type
      - has_perimeters
      - has_buildings
      - has_levels
      - has_zones
      - group_members

  PhysicalElement:
    is_a: Entity
    abstract: true
    class_uri: pbs:PhysicalElement
    exact_mappings:
      - bot:Element
      - ifcowl:IfcElement
    description: Base class for physical elements that can be placed in building/level context.
    slots:
      - parent_building
      - parent_level

  Separator:
    is_a: PhysicalElement
    class_uri: pbs:Separator
    exact_mappings:
      - ifcowl:IfcBuildingElement
    description: Element that separates spaces or zones.
    slots:
      - separator_type
      - contained_spaces

  Connection:
    is_a: PhysicalElement
    class_uri: pbs:Connection
    exact_mappings:
      - ifcowl:IfcBuildingElement
    description: Physical element providing connection between spaces (for example door or window).
    slots:
      - connection_type

  Boundary:
    is_a: PhysicalElement
    class_uri: pbs:Boundary
    exact_mappings:
      - ifcowl:IfcCovering
    description: Physical element acting as a boundary treatment (for example covering).
    slots:
      - boundary_type
      - bounded_space

  Space:
    is_a: Entity
    class_uri: pbs:Space
    exact_mappings:
      - bot:Space
      - ifcowl:IfcSpace
    description: Spatial container used for occupancy, circulation, service, or analysis.
    slots:
      - space_type
      - parent_building
      - parent_level
      - parent_zone
      - bounded_by
      - contained_entities

  Equipment:
    is_a: PhysicalElement
    class_uri: pbs:Equipment
    exact_mappings:
      - bot:Element
      - ifcowl:IfcDistributionElement
    description: Equipment item that is located in a space and assigned to a system.
    slots:
      - equipment_type
      - parent_space
      - parent_system

  System:
    is_a: Entity
    class_uri: pbs:System
    exact_mappings:
      - ifcowl:IfcSystem
    description: Building service system grouping that serves spaces or zones.
    slots:
      - system_type
      - system_discipline
      - parent_project
      - parent_building
      - serves_spaces
      - serves_zones
      - contained_entities

slots:
  id:
    identifier: true
    required: true
    range: string
    description: Unique local identifier.

  name:
    required: true
    range: string
    description: Default display name.

  description:
    range: string
    description: Default description text.

  meaning_uri:
    range: uriorcurie
    description: Optional semantic URI for linking the entity instance to an external ontology concept.

  localized_names:
    multivalued: true
    range: LocalizedText
    inlined: true
    description: Localized variants of name.

  localized_descriptions:
    multivalued: true
    range: LocalizedText
    inlined: true
    description: Localized variants of description.

  tags:
    multivalued: true
    range: string
    description: Optional free-form labels for filtering/grouping.

  ifc_global_id:
    range: string
    description: IFC GlobalId of the mapped entity.

  classifications:
    multivalued: true
    range: Classification
    inlined: true
    description: Classification entries from IFC and other schemes.

  geometry_representations:
    multivalued: true
    range: GeometryRepresentation
    inlined: true
    description: Geometry references associated with the entity.

  quantity_values:
    multivalued: true
    range: QuantityValue
    inlined: true
    description: Quantities associated with the entity.

  classification_scheme:
    range: string
    required: true
    description: Name of the classification scheme (for example ifc, uniclass, omniclass, custom).

  classification_code:
    range: string
    required: true
    description: Classification code inside the scheme.

  classification_label:
    range: string
    description: Optional human-readable classification label.

  classification_version:
    range: string
    description: Optional scheme/version identifier.

  classification_source:
    range: string
    description: Source authority or dataset for this classification.
    class_uri: pbs:LocalizedText
    description: Localized text value for a specific language tag.
    slots:
      - language_tag
      - text_value

  GeometryRepresentation:
    class_uri: pbs:GeometryRepresentation
    description: Minimal geometry reference for an entity.
    slots:
      - geometry_reference
      - geometry_format

  QuantityValue:
    class_uri: pbs:QuantityValue
    description: Minimal quantity record for costing and analysis.
    slots:
      - quantity_type
      - quantity_value
      - quantity_unit
  language_tag:
    range: string
    required: true
    description: IETF BCP 47 language tag (for example en, de, pt-BR).

  text_value:
    range: string
    required: true
    description: Localized text value.

  geometry_reference:
    range: string
    required: true
    description: URI/path/hash/pointer to geometry payload.

  geometry_format:
    range: string
    description: Optional geometry encoding/format (for example ifc, gltf, wkt, geojson).

  quantity_type:
    range: QuantityType
    required: true
    description: Controlled quantity type.

  quantity_value:
    range: double
    required: true
    description: Numeric quantity value.

  quantity_unit:
    range: string
    required: true
    description: Unit of the quantity value.

  connection_type:
    range: ConnectionType
    required: true
    description: Classification of connection element (e.g., door, window).

  separator_type:
    range: SeparatorType
    required: true
    description: Classification of separator element (e.g., wall, slab).

  boundary_type:
    range: BoundaryType
    required: true
    description: Classification of boundary element (e.g., covering).

  context_type:
    range: ContextType
    required: true
    description: Classification of context entity (project, perimeter, building, level, zone).

  space_type:
    range: SpaceType
    required: true
    description: Classification of space (void, circulation, usable, service).

  system_type:
    range: SystemType
    required: true
    description: Classification of system role (unit, network, terminal).

  system_discipline:
    range: SystemDiscipline
    required: true
    description: Classification of system discipline (electrical, sanitary, ventilation, heating).

  equipment_type:
    range: EquipmentType
    required: true
    description: Classification of equipment (for example HVAC, electrical, plumbing).

  parent_context:
    range: ContextEntity
    description: Generic parent context reference (optional fallback relation).

  child_contexts:
    multivalued: true
    range: ContextEntity
    inlined: true
    description: Generic child context references (optional fallback relation).

  has_perimeters:
    multivalued: true
    range: ContextEntity
    inlined: true
    description: Explicit perimeter relation for project/building context nodes.

  has_buildings:
    multivalued: true
    range: ContextEntity
    inlined: true
    description: Explicit building relation for project/perimeter context nodes.

  has_levels:
    multivalued: true
    range: ContextEntity
    inlined: true
    description: Explicit level relation for building context nodes.

  has_zones:
    multivalued: true
    range: ContextEntity
    inlined: true
    description: Explicit zone relation for project/building/level context nodes.

  parent_project:
    range: ContextEntity
    description: Parent project context reference (context_type should be project).

  parent_building:
    range: ContextEntity
    description: Parent building context reference (context_type should be building).

  parent_level:
    range: ContextEntity
    description: Parent level/storey context reference (context_type should be level).

  parent_zone:
    range: ContextEntity
    description: Parent zone context reference (context_type should be zone).

  parent_space:
    range: Space
    description: Parent space where the equipment is located.

  parent_system:
    multivalued: true
    range: System
    description: Parent systems that the equipment belongs to.

  contained_spaces:
    multivalued: true
    range: Space
    inlined: true
    description: Spaces separated by this separator element.

  contained_elements:
    multivalued: true
    range: PhysicalElement
    inlined: true
    description: Physical elements contained by the current node.

  bounded_by:
    multivalued: true
    range: PhysicalElement
    description: Physical elements that bound a space.

  bounded_space:
    range: Space
    description: Space bounded by this boundary element.

  contained_entities:
    multivalued: true
    range: Entity
    description: Generic containment for associated entities.

  zone_type:
    range: ZoneType
    required: true
    description: Classification of zone purpose.

  group_members:
    multivalued: true
    range: Entity
    description: Zone members; may include spaces, separations, systems, etc.

  serves_spaces:
    multivalued: true
    range: Space
    description: Spaces served by this system.

  serves_zones:
    multivalued: true
    range: ContextEntity
    description: Zone context nodes served by this system.

enums:
  ContextType:
    enum_uri: pbs:ContextType
    permissible_values:
      project:
        meaning: ifcowl:IfcProject
      perimeter:
        meaning: ifcowl:IfcSite
        meaning: bot:Site
      building:
        meaning: bot:Building
      level:
        meaning: bot:Storey
      zone:
        meaning: bot:Zone

  ZoneType:
    enum_uri: pbs:ZoneType
    description: Classification of zone purpose and organizational intent.
    permissible_values:
      occupancy_unit:
        description: Occupancy unit zone (for example apartment, office suite, or retail unit).
        meaning: ifcowl:IfcSpatialZone
      tenant:
        description: Tenant area zone used for leasing and occupancy boundaries.
        meaning: ifcowl:IfcSpatialZone
      functional:
        description: Functional grouping zone (for example clinical, retail, office support).
        meaning: ifcowl:IfcSpatialZone
      cost:
        description: Cost grouping zone for estimation and controlling.
        meaning: ifcowl:IfcGroup
      fire:
        description: Fire compartment or fire strategy grouping zone.
        meaning: ifcowl:IfcSpatialZone
      security:
        description: Security management zone for access control and surveillance planning.
        meaning: ifcowl:IfcSpatialZone

  SpaceType:
    enum_uri: pbs:SpaceType
    description: Classification of space semantics used by modeling and downstream conversion.
    permissible_values:
      void:
        description: Non-occupiable or intentionally empty space in the model.
        meaning: ifcowl:IfcSpace
      circulation:
        description: Space primarily intended for movement and access.
        meaning: ifcowl:IfcSpace
      usable:
        description: Space intended for regular occupancy or primary use.
        meaning: ifcowl:IfcSpace
      service:
        description: Space primarily intended for technical/service functions.
        meaning: ifcowl:IfcSpace
      modeled_space:
        description: Modeled space entity representing the geometry and identity of a space.
        meaning: ifcowl:IfcSpace
      gross_floor_area:
        description: Space classification used when representing gross floor area as modeled space.
        meaning: ifcowl:IfcSpace
      gross_volume:
        description: Space classification used when representing gross volume as modeled space.
        meaning: ifcowl:IfcSpace

  SystemType:
    enum_uri: pbs:SystemType
    description: Role of an MEP-related element or grouping in the service chain.
    permissible_values:
      unit:
        description: Generating or converting unit (for example AHU, chiller, heat pump).
        meaning: ifcowl:IfcUnitaryEquipment
      network:
        description: Distribution network element carrying flow (for example ducts, pipes, cable carriers).
        meaning: ifcowl:IfcDistributionFlowElement
      terminal:
        description: End/terminal element located in served spaces.
        meaning: ifcowl:IfcFlowTerminal

  SystemDiscipline:
    enum_uri: pbs:SystemDiscipline
    description: Discipline of a building service system.
    permissible_values:
      electrical:
        description: Electrical power, lighting, and related electrical services.
        meaning: ifcowl:IfcDistributionSystemEnum.ELECTRICAL
      sanitary:
        description: Water supply, drainage, and sanitary plumbing services.
        meaning: ifcowl:IfcDistributionSystemEnum.PLUMBING
      ventilation:
        description: Air movement and ventilation services.
        meaning: ifcowl:IfcDistributionSystemEnum.VENTILATION
      heating:
        description: Heat generation and heat distribution services.
        meaning: ifcowl:IfcDistributionSystemEnum.HEATING

  EquipmentType:
    enum_uri: pbs:EquipmentType
    permissible_values:
      hvac:
        meaning: ifcowl:IfcDistributionElement
      electrical:
        meaning: ifcowl:IfcElectricalElement
      plumbing:
        meaning: ifcowl:IfcFlowTerminal
      fire_safety:
        meaning: ifcowl:IfcFireSuppressionTerminal
      controls:
        meaning: ifcowl:IfcDistributionControlElement
      furniture:
        meaning: ifcowl:IfcFurniture
      other:
        meaning: ifcowl:IfcElement

  ConnectionType:
    enum_uri: pbs:ConnectionType
    permissible_values:
      door:
        meaning: ifcowl:IfcDoor
      window:
        meaning: ifcowl:IfcWindow

  SeparatorType:
    enum_uri: pbs:SeparatorType
    permissible_values:
      wall:
        meaning: ifcowl:IfcWall
      floor:
        meaning: ifcowl:IfcSlabTypeEnum.FLOOR
      roof:
        meaning: ifcowl:IfcSlabTypeEnum.ROOF
      baseslab:
        meaning: ifcowl:IfcSlabTypeEnum.BASESLAB

  BoundaryType:
    enum_uri: pbs:BoundaryType
    permissible_values:
      covering:
        meaning: ifcowl:IfcCovering
      flooring:
        meaning: ifcowl:IfcCoveringTypeEnum.FLOORING
      ceiling:
        meaning: ifcowl:IfcCoveringTypeEnum.CEILING
      cladding:
        meaning: ifcowl:IfcCoveringTypeEnum.CLADDING

  QuantityType:
    enum_uri: pbs:QuantityType
    permissible_values:
      area_net_horizontal:
        meaning: ifcowl:IfcQuantityArea
      area_gross_horizontal:
        meaning: ifcowl:IfcQuantityArea
      area_net_vertical:
        meaning: ifcowl:IfcQuantityArea
      area_gross_vertical:
        meaning: ifcowl:IfcQuantityArea
      volume_net:
        meaning: ifcowl:IfcQuantityVolume
      volume_gross:
        meaning: ifcowl:IfcQuantityVolume
      length:
        meaning: ifcowl:IfcQuantityLength
      width:
        meaning: ifcowl:IfcQuantityLength
      height:
        meaning: ifcowl:IfcQuantityLength
      perimeter:
        meaning: ifcowl:IfcQuantityLength


id: https://schema.pragmaticbim.ch/changes
name: pragmatic_bim_changes_schema
title: Pragmatic BIM Data Contract - Changes
description: >
  Change detection and revision diff records for IFC models, documents, and schema entity fields.
license: MIT

see_also:
  - https://schema.pragmaticbim.ch/changes
  - https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html

prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/

default_prefix: pbs
default_range: string

imports:
  - linkml:types
  - enums_schema
  - core_schema

classes:
  StateRef:
    class_uri: pbs:StateRef
    description: >
      Pointer to a content state at a specific revision.
      Covers IFC models, geometry payloads, documents, and extracted text.
    slots:
      - state_ref
      - state_ref_kind
      - state_ref_format
      - state_ref_label

  PropertyDelta:
    class_uri: pbs:PropertyDelta
    description: >
      Field-level difference between two revision states.
      Supports IFC attributes, PropertySets, schema slots, document fields, and text spans.
    slots:
      - property_path
      - property_path_kind
      - from_value
      - to_value
      - source_pset
      - source_property
      - ifc_attribute_name

  Change:
    class_uri: pbs:Change
    exact_mappings:
      - prov:Activity
    description: >
      Detected difference for one subject between two revisions.
      Supports IFC model diffs, document/text diffs, and schema-entity field changes.
    slots:
      - id
      - change_kind
      - intent_verdict
      - affected_subject_id
      - affected_subject_type
      - affected_subject_path
      - ifc_global_id
      - document_storage_link
      - from_revision
      - to_revision
      - from_state_ref
      - to_state_ref
      - property_delta
      - triggered_task
      - triggered_process
      - detected_at
      - change_source

  ChangeSet:
    class_uri: pbs:ChangeSet
    exact_mappings:
      - prov:Entity
    description: >
      Batch of Change records produced by comparing two model or document revisions.
    slots:
      - id
      - from_revision
      - to_revision
      - changes
      - ifc_state_ref
      - document_state_refs
      - produced_at
      - produced_by

slots:
  state_ref:
    range: uriorcurie
    required: true
    description: URI, path, or content hash identifying the stored content state.

  state_ref_kind:
    range: StateRefKind
    required: true
    description: Kind of content referenced (for example ifc_model, document, text_extract).

  state_ref_format:
    range: string
    description: >
      Optional serialization format (for example ifc, gltf, pdf, docx, markdown, plain_text, json).

  state_ref_label:
    range: string
    description: Optional human-readable label (for example LOD300 export, Spec v3 draft).

  property_path:
    range: string
    required: true
    description: >
      Canonical path to the changed field. Examples: Pset_WallCommon.FireRating, IfcWall.Name,
      description, section.4.2.requirement_3, body:char_offset:1204-1389.

  property_path_kind:
    range: PropertyPathKind
    required: true
    description: Classification of the property path for downstream diff interpretation.

  from_value:
    range: string
    description: Prior value serialized as text. Absent or null for new subjects or fields.

  to_value:
    range: string
    description: New value serialized as text. Absent or null for deleted subjects or fields.

  ifc_attribute_name:
    range: string
    description: IFC attribute name when property_path_kind is ifc_attribute (for example Name, GlobalId).

  change_kind:
    range: ChangeKind
    required: true
    description: Severity or category of change detected between two revisions.

  intent_verdict:
    range: ChangeIntentVerdict
    description: Intent stability verdict from an automated judge (for example iterthink STABLE/NEW).

  affected_subject_id:
    range: string
    required: true
    description: Identifier of the changed subject (entity id, document id, or external key).

  affected_subject_type:
    range: string
    required: true
    description: >
      LinkML class name of the changed subject (for example Space, SeparatorWall, Document).

  affected_subject_path:
    range: string
    description: >
      Optional JSON-pointer-style path for nested targets (for example documents[2],
      localized_descriptions[de], section.4.2.paragraph_1).

  document_storage_link:
    range: uriorcurie
    description: Document location when the subject is or embeds a Document.

  from_revision:
    range: integer
    minimum_value: 0
    required: true
    description: Source revision number for this change.

  to_revision:
    range: integer
    minimum_value: 0
    required: true
    description: Target revision number for this change.

  from_state_ref:
    range: StateRef
    inlined: true
    description: Content state pointer at the source revision.

  to_state_ref:
    range: StateRef
    inlined: true
    description: Content state pointer at the target revision.

  property_delta:
    multivalued: true
    range: PropertyDelta
    inlined: true
    description: Field-level differences detected between the two revision states.

  triggered_task:
    range: string
    description: Id of a Task record that this change triggered or should trigger.

  triggered_process:
    range: uriorcurie
    description: External workflow process URI (for example yourcompanyos process instance).

  detected_at:
    range: datetime
    slot_uri: dcterms:created
    description: Timestamp when this change was detected.

  change_source:
    range: uriorcurie
    description: URI identifying the tool or pipeline that produced this change record.

  changes:
    multivalued: true
    range: Change
    inlined: true
    description: Change records included in this batch.

  ifc_state_ref:
    range: StateRef
    inlined: true
    description: Optional baseline IFC model state for the comparison that produced this changeset.

  document_state_refs:
    multivalued: true
    range: StateRef
    inlined: true
    description: Optional baseline document states for the comparison that produced this changeset.

  produced_at:
    range: datetime
    slot_uri: dcterms:created
    description: Timestamp when this changeset was produced.

  produced_by:
    range: Agent
    slot_uri: prov:wasAttributedTo
    inlined: false
    description: Agent or system that produced this changeset.

id: https://example.org/pragmatic-bim-data-contract/performance
name: pragmatic_bim_performance_schema
title: Pragmatic BIM Data Contract - Performance
description: >
  Domain-specific normalized performance property classes.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://example.org/pragmatic-bim-data-contract/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#

default_prefix: pbs
default_range: string

imports:
  - linkml:types
  - core_schema
  - performance_enums_schema

classes:
  FireProperty:
    is_a: PerformanceProperty
    class_uri: pbs:FireProperty
    description: Normalized fire-related property.
    slot_usage:
      property_key:
        range: FirePropertyKey

  AcousticProperty:
    is_a: PerformanceProperty
    class_uri: pbs:AcousticProperty
    description: Normalized acoustic-related property.
    slot_usage:
      property_key:
        range: AcousticPropertyKey

  ThermalProperty:
    is_a: PerformanceProperty
    class_uri: pbs:ThermalProperty
    description: Normalized thermal-related property.
    slot_usage:
      property_key:
        range: ThermalPropertyKey

  StructuralProperty:
    is_a: PerformanceProperty
    class_uri: pbs:StructuralProperty
    description: Normalized structural-related property.
    slot_usage:
      property_key:
        range: StructuralPropertyKey

  SecurityProperty:
    is_a: PerformanceProperty
    class_uri: pbs:SecurityProperty
    description: Normalized security-related property.
    slot_usage:
      property_key:
        range: SecurityPropertyKey

  MaterialProperty:
    is_a: PerformanceProperty
    class_uri: pbs:MaterialProperty
    description: Normalized material-related property.
    slot_usage:
      property_key:
        range: MaterialPropertyKey

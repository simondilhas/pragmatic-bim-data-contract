name: Converter CI

on:
  push:
    branches: ["main"]
    paths:
      - "converter/**"
      - ".github/workflows/converter-ci.yml"
      - "schema/**"
  pull_request:
    paths:
      - "converter/**"
      - ".github/workflows/converter-ci.yml"
      - "schema/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pragmatic_bim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pragmatic_bim_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install converter
        working-directory: converter
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run SQLite tests
        working-directory: converter
        run: pytest -q

      - name: PostgreSQL smoke (init-db)
        working-directory: converter
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pragmatic_bim_test
          PYTHONPATH: src
        run: |
          pbs-converter init-db --database-url "$DATABASE_URL"

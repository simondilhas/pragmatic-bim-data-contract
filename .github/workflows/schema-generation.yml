name: Schema Generation

on:
  push:
    branches: ["main"]
    paths:
      - "schema/**"
      - ".github/workflows/schema-generation.yml"
  pull_request:
    paths:
      - "schema/**"
      - ".github/workflows/schema-generation.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LinkML
        run: |
          python -m pip install --upgrade pip
          pip install linkml

      - name: Generate SHACL, JSON Schema, ShEx, CSV, Pydantic, and docs
        run: |
          mkdir -p build/schema
          find_cmd() {
            for cmd in "$@"; do
              if command -v "$cmd" >/dev/null 2>&1; then
                echo "$cmd"
                return 0
              fi
            done
            return 1
          }

          SHEX_CMD="$(find_cmd gen-shex shexgen)" || { echo "No ShEx generator command found"; exit 1; }
          CSV_CMD="$(find_cmd gen-csv csvgen)" || { echo "No CSV generator command found"; exit 1; }
          PYDANTIC_CMD="$(find_cmd gen-pydantic pydanticgen)" || { echo "No Pydantic generator command found"; exit 1; }
          DOC_CMD="$(find_cmd gen-doc gen-docs gen-markdown)" || { echo "No docs generator command found"; exit 1; }

          gen-shacl schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.shacl.ttl
          gen-json-schema schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.schema.json
          "$SHEX_CMD" schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.shex
          "$CSV_CMD" schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.csv
          "$PYDANTIC_CMD" schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.pydantic.py
          "$DOC_CMD" schema/00_pragmatic_bim_schema.yaml > build/schema/pragmatic-bim.docs.md

      - name: Upload generated schemas
        uses: actions/upload-artifact@v4
        with:
          name: generated-schemas
          path: build/schema/

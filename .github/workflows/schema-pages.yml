name: Publish Stable Schema Release to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (for manual runs), e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-stable
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install LinkML
        run: |
          python -m pip install --upgrade pip
          pip install linkml markdown pyyaml

      - name: Generate schema outputs
        run: |
          mkdir -p site/schema

          find_cmd() {
            for cmd in "$@"; do
              if command -v "$cmd" >/dev/null 2>&1; then
                echo "$cmd"
                return 0
              fi
            done
            return 1
          }

          CSV_CMD="$(find_cmd gen-csv csvgen)" || { echo "No CSV generator command found"; exit 1; }
          PYDANTIC_CMD="$(find_cmd gen-pydantic pydanticgen)" || { echo "No Pydantic generator command found"; exit 1; }
          DOC_CMD="$(find_cmd gen-markdown gen-docs gen-doc)" || { echo "No docs generator command found"; exit 1; }

          gen-shacl schema/00_pragmatic_bim_data_contract.yaml > site/schema/pragmatic-bim.shacl.ttl
          gen-json-schema schema/00_pragmatic_bim_data_contract.yaml > site/schema/pragmatic-bim.schema.json
          "$CSV_CMD" schema/00_pragmatic_bim_data_contract.yaml > site/schema/pragmatic-bim.csv
          "$PYDANTIC_CMD" schema/00_pragmatic_bim_data_contract.yaml > site/schema/pragmatic-bim.pydantic.py

          if [ "$DOC_CMD" = "gen-doc" ] || [ "$DOC_CMD" = "gen-docs" ]; then
            "$DOC_CMD" -d site/schema schema/00_pragmatic_bim_data_contract.yaml
            if [ -f site/schema/00_pragmatic_bim_data_contract.md ]; then
              cp site/schema/00_pragmatic_bim_data_contract.md site/schema/pragmatic-bim.docs.md
            elif [ -f site/schema/index.md ]; then
              cp site/schema/index.md site/schema/pragmatic-bim.docs.md
            else
              DOC_FILE="$(find site/schema -maxdepth 1 -type f -name '*.md' | head -n 1)"
              [ -n "$DOC_FILE" ] || { echo "No markdown documentation generated by gen-doc"; exit 1; }
              cp "$DOC_FILE" site/schema/pragmatic-bim.docs.md
            fi
          else
            "$DOC_CMD" schema/00_pragmatic_bim_data_contract.yaml > site/schema/pragmatic-bim.docs.md
          fi

          case "$RELEASE_VERSION" in
            v[0-9]*)
              ;;
            *)
              echo "RELEASE_VERSION must start with 'v' (got: $RELEASE_VERSION)"
              exit 1
              ;;
          esac

      - name: Render markdown docs as HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import html as html_lib
          import markdown as md
          import yaml

          def load_class_metadata() -> tuple[dict[str, int], dict[str, str]]:
            root_path = Path("schema/00_pragmatic_bim_data_contract.yaml")
            root = yaml.safe_load(root_path.read_text(encoding="utf-8")) or {}
            imports = root.get("imports", [])
            order: dict[str, int] = {}
            descriptions: dict[str, str] = {}
            idx = 0
            for item in imports:
              if not isinstance(item, str) or item.startswith("linkml:"):
                continue
              schema_file = Path("schema") / f"{item}.yaml"
              if not schema_file.exists():
                continue
              doc = yaml.safe_load(schema_file.read_text(encoding="utf-8")) or {}
              classes = doc.get("classes", {})
              if isinstance(classes, dict):
                for class_name, class_body in classes.items():
                  if class_name not in order:
                    order[class_name] = idx
                    idx += 1
                  if class_name not in descriptions and isinstance(class_body, dict):
                    desc = class_body.get("description")
                    if isinstance(desc, str) and desc.strip():
                      descriptions[class_name] = " ".join(desc.split())
            return order, descriptions

          def normalize_desc(value: str) -> str:
            return " ".join(value.split()).strip()

          def reorder_classes_table(
            text: str,
            class_order: dict[str, int],
            class_descriptions: dict[str, str],
          ) -> str:
            if "## Classes" not in text:
              return text
            lines = text.splitlines()
            start = None
            for i, line in enumerate(lines):
              if line.strip() == "## Classes":
                start = i
                break
            if start is None:
              return text

            table_start = None
            for i in range(start + 1, len(lines)):
              if lines[i].startswith("| Class |"):
                table_start = i
                break
              if lines[i].startswith("## "):
                return text
            if table_start is None or table_start + 1 >= len(lines):
              return text

            rows_start = table_start + 2
            rows_end = rows_start
            while rows_end < len(lines) and lines[rows_end].startswith("| "):
              rows_end += 1

            rows = lines[rows_start:rows_end]
            if not rows:
              return text

            fixed_rows = []
            for row in rows:
              match = re.search(r"\[([A-Za-z0-9_]+)\]\([^)]+\.md\)", row)
              if not match:
                fixed_rows.append(row)
                continue
              class_name = match.group(1)
              parts = row.split("|")
              if len(parts) >= 4:
                current_desc = normalize_desc(parts[2])
                full_desc = class_descriptions.get(class_name)
                if full_desc and (current_desc.endswith("...") or current_desc.endswith("…")):
                  parts[2] = f" {full_desc} "
                  row = "|".join(parts)
              fixed_rows.append(row)

            def row_key(row: str):
              match = re.search(r"\[([A-Za-z0-9_]+)\]\([^)]+\.md\)", row)
              class_name = match.group(1) if match else ""
              order_idx = class_order.get(class_name, 10_000_000)
              return (order_idx, class_name.lower(), row.lower())

            rows_sorted = sorted(fixed_rows, key=row_key)
            return "\n".join(lines[:rows_start] + rows_sorted + lines[rows_end:])

          def normalize_mermaid_blocks(text: str) -> str:
            pattern = re.compile(r"```mermaid\s*\n(.*?)\n```", re.DOTALL)

            def repl(match):
              body = match.group(1)
              compact_lines = [line.rstrip() for line in body.splitlines() if line.strip()]
              normalized = "\n".join(compact_lines)
              # LinkML docs often emit click targets like ../Entity/ which 404 on Pages.
              # Repoint them to local generated HTML pages in the same folder.
              normalized = re.sub(
                r'(click\s+([A-Za-z0-9_]+)\s+href\s+")\.\./([A-Za-z0-9_]+)/?(")',
                lambda m: f'{m.group(1)}./{m.group(3)}.html{m.group(4)}',
                normalized,
              )
              normalized = re.sub(
                r"(click\s+([A-Za-z0-9_]+)\s+href\s+')\.\./([A-Za-z0-9_]+)/?(')",
                lambda m: f"{m.group(1)}./{m.group(3)}.html{m.group(4)}",
                normalized,
              )
              # Open diagram navigation targets in a new tab to preserve context.
              normalized = re.sub(
                r'^(click\s+[A-Za-z0-9_]+\s+href\s+["\'][^"\']+["\'](?:\s+["\'][^"\']*["\'])?)(\s+_[A-Za-z0-9]+)?\s*$',
                lambda m: f"{m.group(1)} _blank",
                normalized,
                flags=re.MULTILINE,
              )
              return "```mermaid\n" + normalized + "\n```"

            return pattern.sub(repl, text)

          def render_mermaid_blocks(html: str) -> str:
            pattern = re.compile(
              r'<pre><code([^>]*)>(.*?)</code></pre>',
              re.DOTALL | re.IGNORECASE,
            )

            def repl(match):
              attrs = match.group(1) or ""
              if "mermaid" not in attrs.lower():
                return match.group(0)
              code = html_lib.unescape(match.group(2))
              return f'<div class="mermaid">\n{code}\n</div>'

            return pattern.sub(repl, html)

          schema_dir = Path("site/schema")
          md_files = sorted(schema_dir.glob("*.md"))
          if not md_files:
            raise SystemExit("No markdown files found in site/schema")
          class_order, class_descriptions = load_class_metadata()

          style = """
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 2rem auto; max-width: 980px; padding: 0 1rem; line-height: 1.55; color: #1f2328; }
          .top-nav { position: sticky; top: 0; z-index: 10; background: #ffffff; border-bottom: 1px solid #d0d7de; padding: 0.6rem 0; margin-bottom: 1rem; }
          .top-nav a { margin-right: 0.9rem; font-weight: 600; }
          .mermaid { border: 1px solid #d0d7de; border-radius: 8px; padding: 0.6rem; background: #fff; margin: 1rem 0; overflow: auto; position: relative; cursor: zoom-in; }
          .diagram-open-btn { position: absolute; top: 0.45rem; right: 0.45rem; font-size: 0.78rem; border: 1px solid #d0d7de; background: #f6f8fa; padding: 0.2rem 0.45rem; border-radius: 4px; cursor: pointer; }
          #diagram-modal[hidden] { display: none; }
          #diagram-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
          .diagram-modal-panel { width: min(96vw, 1500px); height: min(92vh, 1100px); background: #fff; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
          .diagram-modal-header { display: flex; gap: 0.4rem; align-items: center; border-bottom: 1px solid #d0d7de; padding: 0.55rem 0.7rem; }
          .diagram-modal-header button { border: 1px solid #d0d7de; background: #f6f8fa; border-radius: 4px; padding: 0.25rem 0.5rem; cursor: pointer; }
          .diagram-modal-title { font-weight: 600; margin-right: auto; }
          .diagram-modal-body { overflow: auto; padding: 0.7rem; flex: 1; }
          .modal-diagram { min-width: max-content; transform-origin: top left; cursor: default; }
          h1, h2, h3, h4 { line-height: 1.25; }
          table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; }
          th, td { border: 1px solid #d0d7de; padding: 0.45rem 0.6rem; text-align: left; vertical-align: top; }
          th { background: #f6f8fa; }
          code { background: #f6f8fa; padding: 0.15rem 0.35rem; border-radius: 4px; }
          pre { background: #f6f8fa; padding: 0.8rem; border-radius: 6px; overflow-x: auto; }
          a { color: #0969da; text-decoration: none; }
          a:hover { text-decoration: underline; }
          """

          for md_file in md_files:
            text = md_file.read_text(encoding="utf-8")
            if md_file.name == "pragmatic-bim.docs.md":
              text = reorder_classes_table(text, class_order, class_descriptions)
            text = normalize_mermaid_blocks(text)
            html_body = md.markdown(
              text,
              extensions=["tables", "fenced_code", "toc"],
              output_format="html5",
            )
            html_body = re.sub(r'href="([^"]+)\.md"', r'href="\1.html"', html_body)
            html_body = render_mermaid_blocks(html_body)
            title = md_file.stem
            html = f"""<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>{title} - Pragmatic BIM Schema</title>
              <style>{style}</style>
            </head>
            <body>
              <nav class="top-nav">
                <a href="../index.html">Home</a>
                <a href="./pragmatic-bim.docs.html">Schema Index</a>
              </nav>
              {html_body}
              <div id="diagram-modal" hidden>
                <div class="diagram-modal-panel">
                  <div class="diagram-modal-header">
                    <span class="diagram-modal-title">Diagram</span>
                    <button type="button" id="diagram-zoom-in">+</button>
                    <button type="button" id="diagram-zoom-out">-</button>
                    <button type="button" id="diagram-zoom-reset">Reset</button>
                    <button type="button" id="diagram-close">Close</button>
                  </div>
                  <div class="diagram-modal-body">
                    <div id="diagram-modal-content"></div>
                  </div>
                </div>
              </div>
              <script type="module">
                import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
                mermaid.initialize({{ startOnLoad: false, securityLevel: "loose" }});
                await mermaid.run({{ querySelector: ".mermaid" }});

                const modal = document.getElementById("diagram-modal");
                const modalContent = document.getElementById("diagram-modal-content");
                const closeBtn = document.getElementById("diagram-close");
                const zoomInBtn = document.getElementById("diagram-zoom-in");
                const zoomOutBtn = document.getElementById("diagram-zoom-out");
                const zoomResetBtn = document.getElementById("diagram-zoom-reset");
                let scale = 1;

                const applyScale = () => {{
                  const el = modalContent.querySelector(".modal-diagram");
                  if (!el) return;
                  el.style.transform = "scale(" + scale + ")";
                }};

                const openModal = (sourceDiagram) => {{
                  const clone = sourceDiagram.cloneNode(true);
                  clone.classList.add("modal-diagram");
                  clone.querySelectorAll(".diagram-open-btn").forEach((btn) => btn.remove());
                  modalContent.innerHTML = "";
                  modalContent.appendChild(clone);
                  scale = 1;
                  applyScale();
                  modal.hidden = false;
                  document.body.style.overflow = "hidden";
                }};

                const closeModal = () => {{
                  modal.hidden = true;
                  document.body.style.overflow = "";
                  modalContent.innerHTML = "";
                }};

                document.querySelectorAll(".mermaid").forEach((diagram) => {{
                  const btn = document.createElement("button");
                  btn.type = "button";
                  btn.className = "diagram-open-btn";
                  btn.textContent = "Open large diagram";
                  btn.addEventListener("click", (event) => {{
                    event.preventDefault();
                    event.stopPropagation();
                    openModal(diagram);
                  }});
                  diagram.appendChild(btn);

                  diagram.addEventListener("click", (event) => {{
                    if (event.target.closest("a")) return;
                    openModal(diagram);
                  }});
                }});

                closeBtn.addEventListener("click", closeModal);
                zoomInBtn.addEventListener("click", () => {{ scale = Math.min(scale + 0.15, 4); applyScale(); }});
                zoomOutBtn.addEventListener("click", () => {{ scale = Math.max(scale - 0.15, 0.35); applyScale(); }});
                zoomResetBtn.addEventListener("click", () => {{ scale = 1; applyScale(); }});
                modal.addEventListener("click", (event) => {{
                  if (event.target === modal) closeModal();
                }});
                document.addEventListener("keydown", (event) => {{
                  if (event.key === "Escape" && !modal.hidden) closeModal();
                }});
              </script>
            </body>
          </html>
          """
            md_file.with_suffix(".html").write_text(html, encoding="utf-8")
          PY

      - name: Write landing page
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Pragmatic BIM Schema (Stable)</title>
            </head>
            <body>
              <h1>Pragmatic BIM Schema (Stable)</h1>
              <p>Latest stable release artifacts are available here.</p>
              <ul>
                <li><a href="./schema/pragmatic-bim.schema.json">JSON Schema</a></li>
                <li><a href="./schema/pragmatic-bim.shacl.ttl">SHACL</a></li>
                <li><a href="./schema/pragmatic-bim.csv">CSV</a></li>
                <li><a href="./schema/pragmatic-bim.pydantic.py">Pydantic</a></li>
                <li><a href="./schema/pragmatic-bim.docs.html">Docs (HTML)</a></li>
                <li><a href="./schema/pragmatic-bim.docs.md">Docs (Markdown, raw)</a></li>
                <li><a href="./latest/index.html">Latest stable alias</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Publish latest and versioned snapshots
        run: |
          mkdir -p "site/latest" "site/$RELEASE_VERSION"

          cp -R site/schema "site/latest/"
          cp -R site/schema "site/$RELEASE_VERSION/"
          cp site/index.html "site/latest/index.html"

          cat > "site/$RELEASE_VERSION/index.html" <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Pragmatic BIM Schema ($RELEASE_VERSION)</title>
            </head>
            <body>
              <h1>Pragmatic BIM Schema ($RELEASE_VERSION)</h1>
              <p>Version-pinned release artifacts.</p>
              <ul>
                <li><a href="./schema/pragmatic-bim.schema.json">JSON Schema</a></li>
                <li><a href="./schema/pragmatic-bim.shacl.ttl">SHACL</a></li>
                <li><a href="./schema/pragmatic-bim.csv">CSV</a></li>
                <li><a href="./schema/pragmatic-bim.pydantic.py">Pydantic</a></li>
                <li><a href="./schema/pragmatic-bim.docs.html">Docs (HTML)</a></li>
                <li><a href="./schema/pragmatic-bim.docs.md">Docs (Markdown, raw)</a></li>
              </ul>
            </body>
          </html>
          HTML

          cat > site/versions.json <<JSON
          {
            "latest": "$RELEASE_VERSION",
            "versions": ["$RELEASE_VERSION"]
          }
          JSON

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
